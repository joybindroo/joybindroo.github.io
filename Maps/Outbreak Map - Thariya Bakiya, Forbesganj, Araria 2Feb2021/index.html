<!doctype html>

        }

            attribution: '',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 18
        });
        layer_GoogleSatellite_0;
        map.addLayer(layer_GoogleSatellite_0);
        function pop_PKDL_1(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <th scope="row">Block</th>\
                        <td>' + (feature.properties['Block'] !== null ? autolinker.link(feature.properties['Block'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Village</th>\
                        <td>' + (feature.properties['Village'] !== null ? autolinker.link(feature.properties['Village'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">KAMIS PID</th>\
                        <td>' + (feature.properties['KAMIS PID'] !== null ? autolinker.link(feature.properties['KAMIS PID'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Lat_HH</th>\

                    </tr>\
                    <tr>\
                        <th scope="row">Year of onset of fever</th>\
                        <td>' + (feature.properties['Year of onset of fever'] !== null ? autolinker.link(feature.properties['Year of onset of fever'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Month of diagnosis</th>\
                        <td>' + (feature.properties['Month of diagnosis'] !== null ? autolinker.link(feature.properties['Month of diagnosis'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Year of diagnosis</th>\
                        <td>' + (feature.properties['Year of diagnosis'] !== null ? autolinker.link(feature.properties['Year of diagnosis'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Type of case</th>\
                        <td>' + (feature.properties['Type of case'] !== null ? autolinker.link(feature.properties['Type of case'].toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            layer.bindPopup(popupContent, {maxHeight: 400});
        }

        function style_PKDL_1_0(feature) {
            switch(String(feature.properties['Year of diagnosis'])) {
                case '2020':
                    return {
                pane: 'pane_PKDL_1',
                radius: 4.0,
                opacity: 1,
                color: 'rgba(35,35,35,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(132,32,209,1.0)',
                interactive: true,
            }
                    break;
            }
        }
        map.createPane('pane_PKDL_1');
        map.getPane('pane_PKDL_1').style.zIndex = 401;
        map.getPane('pane_PKDL_1').style['mix-blend-mode'] = 'normal';
        var layer_PKDL_1 = new L.geoJson(json_PKDL_1, {
            attribution: '',
            interactive: true,
            dataVar: 'json_PKDL_1',
            layerName: 'layer_PKDL_1',
            pane: 'pane_PKDL_1',
            onEachFeature: pop_PKDL_1,
            pointToLayer: function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };
                return L.circleMarker(latlng, style_PKDL_1_0(feature));
            },
        });
        bounds_group.addLayer(layer_PKDL_1);
        map.addLayer(layer_PKDL_1);

        function style_VL_2_0(feature) {

            }
                    break;
                case '2021':
                    return {

        map.getPane('pane_VL_2').style['mix-blend-mode'] = 'normal';
        var layer_VL_2 = new L.geoJson(json_VL_2, {

            },
        });
        bounds_group.addLayer(layer_VL_2);
        map.addLayer(layer_VL_2);
        var baseMaps = {};
        L.control.layers(baseMaps,{'VL<br /><table><tr><td style="text-align: center;"><img src="legend/VL_2_20200.png" /></td><td>2020</td></tr><tr><td style="text-align: center;"><img src="legend/VL_2_20211.png" /></td><td>2021</td></tr></table>': layer_VL_2,'PKDL<br /><table><tr><td style="text-align: center;"><img src="legend/PKDL_1_20200.png" /></td><td>2020</td></tr></table>': layer_PKDL_1,"Google Satellite": layer_GoogleSatellite_0,},{collapsed:false}).addTo(map);L.control.scale({position: 'bottomleft', maxWidth: 100, metric: true, imperial: false, updateWhenIdle: false}).addTo(map);
